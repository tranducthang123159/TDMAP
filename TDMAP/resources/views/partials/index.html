<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">
    <title>WEB GIS THỬA ĐẤT</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        #toolbar {
            background: #2c3e50;
            padding: 10px;
            color: white;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #toolbar input {
            padding: 6px;
            border: none;
            border-radius: 4px;
        }

        #toolbar button {
            padding: 6px 12px;
            border: none;
            background: #3498db;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        #toolbar button:hover {
            background: #2980b9;
        }

        #map {
            height: 75vh;
        }

        #info {
            padding: 15px;
            background: white;
            border-top: 1px solid #ddd;
            font-size: 15px;
        }

        .pointLabel {
            background: #1e73ff;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border: 2px solid white;
        }

        .edgeLabel {
            background: white;
            border: 2px solid red;
            padding: 2px 6px;
            font-size: 12px;
            border-radius: 4px;
        }

        .areaLabel {
            background: #27ae60;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 13px;
        }
    </style>

</head>

<body>

    <div id="toolbar">

        <input type="file" id="geojsonFile">

        <input type="text" id="to" placeholder="Tờ">
        <input type="text" id="thua" placeholder="Thửa">

        <button onclick="loadMap()">Load Map</button>
        <button onclick="searchParcel()">TÌM</button>
        <button onclick="clearLabels()">Clear</button>

    </div>

    <div id="map"></div>

    <div id="info">
        <b>Click thửa đất để xem thông tin</b>
    </div>


    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>

        var map = L.map('map').setView([12.5, 108], 16);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 22
        }).addTo(map);


        let geoLayer;
        let labelLayer = L.layerGroup().addTo(map);
        let geoData;


        function loadMap() {

            let file = document.getElementById("geojsonFile").files[0];

            if (!file) {
                alert("Chọn file GeoJSON");
                return;
            }

            let reader = new FileReader();

            reader.onload = function (e) {

                geoData = JSON.parse(e.target.result);

                if (geoLayer) {
                    map.removeLayer(geoLayer);
                }

                geoLayer = L.geoJSON(geoData, {

                    style: {
                        color: "yellow",
                        weight: 1,
                        fillOpacity: 0
                    },

                    onEachFeature: function (feature, layer) {

                        layer.on("click", function () {

                            highlight(layer);

                            showInfo(feature.properties);

                            drawEdges(layer);

                        });

                    }

                }).addTo(map);

                map.fitBounds(geoLayer.getBounds());

            };

            reader.readAsText(file);

        }



        function highlight(layer) {

            geoLayer.eachLayer(function (l) {
                geoLayer.resetStyle(l);
            });

            layer.setStyle({
                color: "red",
                weight: 3,
                fillOpacity: 0.2
            });

            map.fitBounds(layer.getBounds());

        }



        function drawEdges(layer) {

            labelLayer.clearLayers();

            let latlngs = layer.getLatLngs();

            if (!latlngs) return;

            let coords;

            // xử lý polygon hoặc multipolygon
            if (Array.isArray(latlngs[0][0])) {
                coords = latlngs[0][0];
            } else {
                coords = latlngs[0];
            }

            if (coords.length < 3) return;



            // ===== HIỆN ĐIỂM =====

            coords.forEach((p, i) => {

                L.marker(p, {
                    icon: L.divIcon({
                        className: "",
                        html: `<div class="pointLabel">${i + 1}</div>`
                    })
                }).addTo(labelLayer);

            });



            // ===== HIỆN CHIỀU DÀI CẠNH =====

            for (let i = 0; i < coords.length; i++) {

                let p1 = coords[i];
                let p2 = coords[(i + 1) % coords.length];

                let dist = p1.distanceTo(p2);

                let mid = L.latLng(
                    (p1.lat + p2.lat) / 2,
                    (p1.lng + p2.lng) / 2
                );

                L.marker(mid, {
                    icon: L.divIcon({
                        className: "",
                        html: `<div class="edgeLabel">${dist.toFixed(2)} m</div>`
                    })
                }).addTo(labelLayer);

            }



            // ===== TÍNH DIỆN TÍCH =====

            let area = polygonArea(coords);

            let center = layer.getBounds().getCenter();

            L.marker(center, {
                icon: L.divIcon({
                    className: "",
                    html: `<div class="areaLabel">${area.toFixed(2)} m²</div>`
                })
            }).addTo(labelLayer);

        }



        function polygonArea(coords) {

            let area = 0;

            for (let i = 0; i < coords.length; i++) {

                let j = (i + 1) % coords.length;

                area += coords[i].lng * coords[j].lat;
                area -= coords[j].lng * coords[i].lat;

            }

            area = Math.abs(area / 2);

            area = area * 111319 * 111319;

            return area;

        }



        function showInfo(p) {

            document.getElementById("info").innerHTML = `

<b>ID:</b> ${p.ID || ""} <br>
<b>Tờ:</b> ${p.SHBANDO || ""} <br>
<b>Thửa:</b> ${p.SHTHUA || ""} <br>
<b>Diện tích:</b> ${p.DIENTICH || ""} m² <br>
<b>Loại đất:</b> ${p.KHLOAIDAT || ""} <br>
<b>Tên chủ:</b> ${p.TENCHU || ""} <br>
<b>Địa chỉ:</b> ${p.DIACHI || ""}

`;

        }



        function searchParcel() {

            let to = document.getElementById("to").value;
            let thua = document.getElementById("thua").value;

            geoLayer.eachLayer(function (layer) {

                let p = layer.feature.properties;

                if (p.SHBANDO == to && p.SHTHUA == thua) {

                    highlight(layer);

                    showInfo(p);

                    drawEdges(layer);

                }

            });

        }



        function clearLabels() {

            labelLayer.clearLayers();

        }

    </script>

</body>

</html>
